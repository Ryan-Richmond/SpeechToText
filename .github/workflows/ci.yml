name: CI

on:
  push:
  pull_request:

jobs:
  apple-build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          brew install xcodegen swiftlint

      - name: Generate Xcode project
        run: scripts/bootstrap_xcodeproj.sh

      - name: Build iOS
        run: xcodebuild -project Vox.xcodeproj -scheme "Vox-iOS" -destination 'generic/platform=iOS Simulator' build

      - name: Build macOS
        run: xcodebuild -project Vox.xcodeproj -scheme "Vox-macOS" -destination 'platform=macOS' build

      - name: Test macOS
        run: xcodebuild -project Vox.xcodeproj -scheme "Vox-macOS" -destination 'platform=macOS' test

      - name: SwiftLint
        run: swiftlint

      - name: Privacy audit
        run: scripts/privacy_audit.sh
