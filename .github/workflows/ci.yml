name: CI

on:
  push:
  pull_request:

jobs:
  apple-build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build iOS
        run: xcodebuild -project Vox.xcodeproj -scheme "Vox iOS" -destination 'platform=iOS Simulator,name=iPhone 16' build

      - name: Build macOS
        run: xcodebuild -project Vox.xcodeproj -scheme "Vox macOS" -destination 'platform=macOS' build

      - name: Test macOS
        run: xcodebuild -project Vox.xcodeproj -scheme "Vox macOS" -destination 'platform=macOS' test

      - name: SwiftLint
        run: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint
          else
            echo "swiftlint not found"
            exit 1
          fi

      - name: Privacy audit
        run: scripts/privacy_audit.sh
